name: Keep BakeSmart Vercel App Warm

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedules are best-effort; 5 minutes is the minimum supported cadence.
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: keep-bakesmart-vercel-warm
  cancel-in-progress: false

jobs:
  keep-alive:
    name: Wake and warm Vercel app
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      APP_URL: "https://bake-smart-patri.vercel.app"
      KEEPALIVE_PATHS: "/ping /api/health /"

    steps:
      - name: Show trigger info
        run: |
          echo "Workflow is running"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: Keep Vercel app warm
        shell: bash
        run: |
          set -u

          failed=0
          stamp="$(date +%s)"

          for path in $KEEPALIVE_PATHS; do
            separator="?"
            if [[ "$path" == *"?"* ]]; then
              separator="&"
            fi
            url="${APP_URL%/}${path}${separator}keepalive=github-actions-${stamp}"
            echo ""
            echo "Pinging $url"

            code=$(curl -L -sS -o /tmp/keepalive_body.html -w "%{http_code}" \
              --max-time 45 \
              --connect-timeout 15 \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 3 \
              -A "GitHubActions-KeepAlive-BakeSmartPatri" \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "$url" || echo "000")

            echo "HTTP code: $code"
            head -n 12 /tmp/keepalive_body.html 2>/dev/null || true

            if [[ ! "$code" =~ ^(2|3)[0-9][0-9]$ ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            echo "At least one keep-alive request failed."
            exit 1
          fi

          echo "All keep-alive requests responded successfully."
