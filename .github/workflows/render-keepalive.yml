name: Keep Render App Warm

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedules are best-effort. Running off minute 0 helps avoid the busiest queue.
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: read

concurrency:
  group: keep-render-app-warm
  cancel-in-progress: false

jobs:
  keep-alive:
    name: Wake and warm Render app
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      APP_URL: "https://bakesmart-patri.onrender.com"
      PING_INTERVAL_SECONDS: "180"
      PING_COUNT: "4"

    steps:
      - name: Show trigger info
        run: |
          echo "Workflow is running"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: Keep Render app warm
        shell: bash
        run: |
          set -u

          success=0

          for attempt in $(seq 1 "$PING_COUNT"); do
            echo ""
            echo "Attempt $attempt/$PING_COUNT"

            code=$(curl -L -sS -o /tmp/render_body.html -w "%{http_code}" \
              --max-time 60 \
              --connect-timeout 20 \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 5 \
              -A "GitHubActions-KeepAlive-BakeSmartPatri" \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "$APP_URL/?keepalive=github-actions-$attempt-$(date +%s)" || echo "000")

            echo "HTTP code: $code"
            head -n 12 /tmp/render_body.html 2>/dev/null || true

            if [[ "$code" =~ ^(2|3)[0-9][0-9]$ ]]; then
              success=1
            fi

            if [[ "$attempt" != "$PING_COUNT" ]]; then
              sleep "$PING_INTERVAL_SECONDS"
            fi
          done

          if [[ "$success" -eq 1 ]]; then
            echo "Render responded at least once."
            exit 0
          fi

          echo "Render did not respond successfully."
          exit 1
